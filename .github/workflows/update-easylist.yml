name: Update EasyList Daily

on:
  schedule:
    - cron: "0 23 * * *"  # 每天 UTC 23:00 运行
  workflow_dispatch:  # 支持手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}  # 使用 PAT_TOKEN 允许触发后续的 workflow 并拥有推送权限

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run EasyList update script
        run: python update_easylist.py

      - name: Run Blacklist update script
        run: python update_blacklist_config.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add modified_easylist.txt optimized_blacklist.conf
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EasyList and blacklist config $(date -u)"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}  # 使用 PAT_TOKEN 进行 push
